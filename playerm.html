<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NES Player</title>
<script>if(window.innerWidth>820&&!('ontouchstart'in window)&&navigator.maxTouchPoints<=0)location.replace('player.html'+location.search)</script>
<script type="importmap">
{
  "imports": {
    "@nesjs/native": "./lib/nesjs/native.mjs"
  }
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #222; color: #fff; min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column; padding: 8px; overflow-x: hidden;
}
.top-bar { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.top-bar h1 { font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top-bar select {
  padding: 6px 8px; background: #333; color: #fff; border: none;
  border-radius: 6px; font-size: 13px; max-width: 180px;
}
.canvas-wrap {
  position: relative; width: 100%; max-width: 512px;
  margin: 0 auto; flex-shrink: 0;
}
canvas {
  display: block; width: 100%; aspect-ratio: 256/240;
  image-rendering: pixelated; background: #000; border-radius: 4px; cursor: pointer;
}
canvas.filter-smooth { image-rendering: auto; }
#scanline {
  display: none; position: absolute; inset: 0; border-radius: 4px;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,.15) 0px, rgba(0,0,0,.15) 1px, transparent 1px, transparent 3px);
}
#mapperInfo { font-size: 11px; opacity: .4; text-align: center; margin: 4px 0; }
.toolbar {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 6px 0 8px;
}
.btn {
  padding: 8px 14px; background: #444; color: #fff; border: none;
  border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer;
  text-decoration: none; transition: background .2s;
}
.btn:active { background: #666; }

/* ── Virtual gamepad ── */
.gamepad {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  max-width: 400px; margin: 4px auto 0; width: 100%;
  touch-action: none; -webkit-user-select: none; user-select: none;
}
.dpad {
  display: grid;
  grid-template-areas:
    ".  up  ."
    "left .  right"
    ".  down .";
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 3px; aspect-ratio: 1;
}
.dpad-btn {
  background: rgba(255,255,255,.12); border: none; border-radius: 6px;
  color: #fff; font-size: 18px; display: flex; align-items: center;
  justify-content: center; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.dpad-btn:active { background: rgba(255,255,255,.25); }
.dpad-up    { grid-area: up; }
.dpad-down  { grid-area: down; }
.dpad-left  { grid-area: left; }
.dpad-right { grid-area: right; }
.face-btns {
  display: grid;
  grid-template-areas:
    ".  y  ."
    "b  .  a"
    ".  x  .";
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 3px; aspect-ratio: 1;
}
.face-btn {
  background: rgba(255,255,255,.12); border: none; border-radius: 50%;
  color: #fff; font-size: 12px; font-weight: bold;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.face-btn:active { background: rgba(255,255,255,.25); }
.face-btn.turbo { color: #f88; }
.face-a { grid-area: a; }
.face-b { grid-area: b; }
.face-x { grid-area: x; }
.face-y { grid-area: y; }
.sys-btns {
  display: flex; gap: 6px; justify-content: center;
  grid-column: 1 / -1;
}
.sys-btn {
  padding: 10px 20px; background: rgba(255,255,255,.1); border: none;
  border-radius: 8px; color: #fff; font-size: 13px; font-weight: bold; cursor: pointer;
  flex: 1; max-width: 120px;
}
.sys-btn:active { background: rgba(255,255,255,.2); }

.help-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
  z-index: 100; justify-content: center; align-items: center;
}
.help-overlay.open { display: flex; }
.help-box {
  background: #333; padding: 24px 28px; border-radius: 12px;
  max-width: 320px; width: 90%; font-size: 14px; line-height: 1.8;
}
.help-box h2 { text-align: center; margin-bottom: 12px; }
.help-box kbd {
  display: inline-block; background: #555; padding: 1px 8px; border-radius: 4px;
  font-family: monospace; font-size: 13px;
}
.help-box .row { display: flex; justify-content: space-between; }
.help-box .close-btn {
  display: block; margin: 16px auto 0; padding: 8px 24px; background: #e67e22;
  color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
}
</style>
</head>
<body>

<div class="top-bar">
  <h1 id="title">Now Playing</h1>
  <select id="gameSelect"></select>
</div>

<div class="canvas-wrap">
  <canvas id="screen" width="256" height="240"></canvas>
  <div id="scanline"></div>
</div>
<div id="mapperInfo"></div>

<div class="toolbar">
  <a class="btn" href="indexm.html">← Back</a>
  <button class="btn" id="resetBtn">Reset</button>
  <button class="btn" id="helpBtn">Help</button>
  <button class="btn" id="soundBtn">Sound: On</button>
  <button class="btn" id="fullscreenBtn">Fullscreen</button>
</div>

<!-- Virtual gamepad -->
<div class="gamepad" id="gamepad">
  <div class="dpad" id="dpad">
    <button class="dpad-btn dpad-up"    data-code="ArrowUp">▲</button>
    <button class="dpad-btn dpad-left"  data-code="ArrowLeft">◀</button>
    <button class="dpad-btn dpad-right" data-code="ArrowRight">▶</button>
    <button class="dpad-btn dpad-down"  data-code="ArrowDown">▼</button>
  </div>
  <div class="face-btns" id="faceBtns">
    <button class="face-btn face-a" data-code="KeyX">A</button>
    <button class="face-btn face-b" data-code="KeyZ">B</button>
    <button class="face-btn face-x turbo" data-code="KeyX" data-turbo="1">Turbo A</button>
    <button class="face-btn face-y turbo" data-code="KeyZ" data-turbo="1">Turbo B</button>
  </div>
  <div class="sys-btns">
    <button class="sys-btn" id="selectBtn">Select</button>
    <button class="sys-btn" id="startBtn">Start</button>
  </div>
</div>

<div class="help-overlay" id="helpOverlay">
  <div class="help-box">
    <h2>Controls</h2>
    <div class="row"><span>D-Pad</span><span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></span></div>
    <div class="row"><span>A</span><span><kbd>K</kbd> / <kbd>X</kbd></span></div>
    <div class="row"><span>B</span><span><kbd>J</kbd> / <kbd>Z</kbd></span></div>
    <div class="row"><span>Start</span><span><kbd>Enter</kbd></span></div>
    <div class="row"><span>Select</span><span><kbd>Shift</kbd></span></div>
    <div class="row"><span>Reset</span><span><kbd>F2</kbd></span></div>
    <button class="close-btn" id="closeHelpBtn">Close</button>
  </div>
</div>

<script>
let pages;
const params = new URLSearchParams(location.search);
let currentPage = parseInt(params.get('page')) || 1;
let currentGame = parseInt(params.get('game')) || 1;
const canvas = document.getElementById('screen');
const gamepad = document.getElementById('gamepad');

document.addEventListener('keydown', e => {
  if (e.code === 'Escape') document.getElementById('helpOverlay').classList.remove('open');
  const gameKeys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space',
    'KeyW','KeyA','KeyS','KeyD','KeyZ','KeyX','KeyJ','KeyK',
    'Enter','ShiftLeft','ShiftRight','F2','Digit1','Digit2','KeyI','KeyU']
  if (gameKeys.includes(e.code)) e.preventDefault()
})

fetch('games.json').then(r => r.json()).then(data => {
  pages = data;
  const sel = document.getElementById('gameSelect');
  for (let p = 0; p < pages.length; p++) {
    const grp = document.createElement('optgroup');
    grp.label = 'Page ' + (p + 1);
    for (let g = 0; g < pages[p].length; g++) {
      const opt = document.createElement('option');
      opt.value = (p + 1) + ',' + (g + 1);
      opt.textContent = (g + 1) + '. ' + pages[p][g];
      grp.appendChild(opt);
    }
    sel.appendChild(grp);
  }
  sel.value = currentPage + ',' + currentGame;
  document.getElementById('title').textContent = pages[currentPage-1][currentGame-1];
  sel.addEventListener('change', () => {
    const parts = sel.value.split(',');
    currentPage = parseInt(parts[0]); currentGame = parseInt(parts[1]);
    params.set('page', currentPage); params.set('game', currentGame);
    location.search = params.toString();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => { if (window.__nesjsNative) window.__nesjsNative.reset(); });
document.getElementById('helpBtn').addEventListener('click', () => document.getElementById('helpOverlay').classList.toggle('open'));
document.getElementById('closeHelpBtn').addEventListener('click', () => document.getElementById('helpOverlay').classList.remove('open'));
document.getElementById('helpOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) e.target.classList.remove('open'); });
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.body.requestFullscreen();
});
document.getElementById('soundBtn').addEventListener('click', () => {
  const e = window.__nesjsNative?.emulator;
  if (!e) return;
  if (document.getElementById('soundBtn').textContent === 'Sound: On') {
    e.disableAudio(); document.getElementById('soundBtn').textContent = 'Sound: Off';
  } else {
    e.enableAudio(); document.getElementById('soundBtn').textContent = 'Sound: On';
  }
});

// Virtual gamepad: dispatch keyboard events on touch
const TURBO_INTERVAL = 33; // ~30 presses/sec
const turboTimers = new Map();

function fire(code, type) {
  document.dispatchEvent(new KeyboardEvent(type, {
    code, key: code.replace('Key','').replace('Arrow',''), bubbles: true
  }));
}

function setupBtn(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); fire(code, 'keydown'); });
  el.addEventListener('touchend', e => { e.preventDefault(); fire(code, 'keyup'); });
  el.addEventListener('touchcancel', e => { e.preventDefault(); fire(code, 'keyup'); });
  el.addEventListener('mousedown', () => fire(code, 'keydown'));
  el.addEventListener('mouseup', () => fire(code, 'keyup'));
  el.addEventListener('mouseleave', () => fire(code, 'keyup'));
}

function startTurbo(el, code) {
  if (turboTimers.has(el)) return;
  fire(code, 'keydown');
  const timer = setInterval(() => {
    fire(code, 'keyup');
    fire(code, 'keydown');
  }, TURBO_INTERVAL);
  turboTimers.set(el, timer);
}

function stopTurbo(el, code) {
  const timer = turboTimers.get(el);
  if (!timer) return;
  clearInterval(timer);
  turboTimers.delete(el);
  fire(code, 'keyup');
}

document.querySelectorAll('[data-code]').forEach(el => {
  const code = el.dataset.code;
  if (el.dataset.turbo) {
    el.addEventListener('touchstart', e => { e.preventDefault(); startTurbo(el, code); });
    el.addEventListener('touchend', e => { e.preventDefault(); stopTurbo(el, code); });
    el.addEventListener('touchcancel', e => { e.preventDefault(); stopTurbo(el, code); });
    el.addEventListener('mousedown', () => startTurbo(el, code));
    el.addEventListener('mouseup', () => stopTurbo(el, code));
    el.addEventListener('mouseleave', () => stopTurbo(el, code));
  } else {
    el.addEventListener('touchstart', e => { e.preventDefault(); fire(code, 'keydown'); });
    el.addEventListener('touchend', e => { e.preventDefault(); fire(code, 'keyup'); });
    el.addEventListener('touchcancel', e => { e.preventDefault(); fire(code, 'keyup'); });
    el.addEventListener('mousedown', () => fire(code, 'keydown'));
    el.addEventListener('mouseup', () => fire(code, 'keyup'));
    el.addEventListener('mouseleave', () => fire(code, 'keyup'));
  }
});
setupBtn('selectBtn', 'ShiftLeft');
setupBtn('startBtn', 'Enter');
</script>
<script type="module">
import { NESEmulator } from '@nesjs/native'

const p = new URLSearchParams(location.search)
const page = parseInt(p.get('page')) || 1
const game = parseInt(p.get('game')) || 1
const canvas = document.getElementById('screen')
const emu = new NESEmulator(canvas, { scale: 2, smoothing: false })

const { adapter } = emu.controller
const add = (code, idx) => adapter.addEvent(code, { player: 1, index: idx })
add('ArrowUp', 4); add('ArrowDown', 5); add('ArrowLeft', 6); add('ArrowRight', 7)
add('KeyX', 0); add('KeyZ', 1)
add('Enter', 3); add('ShiftLeft', 2); add('ShiftRight', 2)

const res = await fetch(`rom/page${page}/${game}.txt`)
const data = new Uint8Array(await res.arrayBuffer())
await emu.loadROM(data)

emu.lastFrameTime = performance.now()
emu.run()

const enableAudio = async () => {
  if (await emu.enableAudio())
    document.getElementById('soundBtn').textContent = 'Sound: On'
  document.removeEventListener('keydown', enableAudio)
  document.removeEventListener('click', enableAudio)
}
document.addEventListener('keydown', enableAudio)
document.addEventListener('click', enableAudio)

window.__nesjsNative = { emulator: emu, reset: () => emu.reset(), stop: () => emu.stop() }
</script>
</body>
</html>
