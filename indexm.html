<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>300 VCD Game Menu</title>
<script>if(window.innerWidth>820&&!('ontouchstart'in window)&&navigator.maxTouchPoints<=0)location.replace('index.html'+location.search)</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #e0e0e0; min-height: 100vh; display: flex;
  justify-content: center; align-items: center; padding: 12px;
  background-size: cover; background-position: right; background-attachment: fixed; background-repeat: no-repeat;
}
.card {
  background: rgba(0,0,0,.68); border-radius: 20px; padding: 24px 20px;
  box-shadow: 0 12px 48px rgba(0,0,0,.7); max-width: 460px; width: 100%;
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  color: #fff; font-weight: 500;
}
h1 { text-align: center; font-size: 24px; margin-bottom: 4px; letter-spacing: .5px; }
.page { text-align: center; font-size: 13px; opacity: .5; margin-bottom: 18px; }
ul { list-style: none; }
li {
  padding: 16px 16px; border-bottom: 1px solid rgba(255,255,255,.08);
  font-size: 17px; display: flex; cursor: pointer; border-radius: 12px;
  text-decoration: none; color: #fff; transition: background .2s;
  -webkit-user-select: none; user-select: none;
}
li:hover { background: rgba(255,255,255,.08); }
li:active { background: rgba(255,255,255,.14); }
li:last-child { border-bottom: none; }
a { text-decoration: none; color: inherit; display: flex; width: 100%; }
.num { width: 36px; flex-shrink: 0; opacity: .45; }
.nav { display: flex; justify-content: center; gap: 12px; margin-top: 22px; }
.nav-btn {
  display: inline-block; padding: 12px 24px; background: rgba(255,255,255,.15);
  color: #fff; text-decoration: none; border-radius: 12px;
  font-size: 16px; transition: background .2s, transform .15s; cursor: pointer;
  border: none; font-weight: 600; flex: 1; max-width: 160px;
}
.nav-btn:hover { background: rgba(255,255,255,.25); }
.nav-btn:active { background: rgba(255,255,255,.35); transform: scale(.96); }
.nav-btn:disabled { opacity: .25; pointer-events: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Game Menu</h1>
  <div class="page" id="pageLabel">Page 1</div>
  <ul id="gameList"></ul>
  <div class="nav">
    <button class="nav-btn" id="prevBtn">← Previous</button>
    <button class="nav-btn" id="nextBtn">Next →</button>
  </div>
</div>
<script>
let pages;
let currentPage = 1;

function setBg(page) {
  const idx = ((page - 1) % 5) + 1;
  const colors = ['#fcba25','#f3f5ef','#e5edfa','#ffffff','#fdfbf8'];
  document.body.style.backgroundImage = `url(img/vcd-300-00${idx}.webp)`;
  document.body.style.backgroundColor = colors[idx - 1];
}

function render(page) {
  const games = pages[page - 1];
  document.getElementById('pageLabel').textContent = `Page ${page}`;
  document.getElementById('gameList').innerHTML = games.map((g, i) =>
    `<a href="playerm.html?page=${page}&game=${i+1}"><li><span class="num">${i+1}.</span> ${g}</li></a>`
  ).join('');
  document.getElementById('prevBtn').disabled = page <= 1;
  document.getElementById('nextBtn').disabled = page >= pages.length;
  setBg(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentPage > 1) { currentPage--; render(currentPage); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentPage < pages.length) { currentPage++; render(currentPage); }
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && currentPage > 1) { currentPage--; render(currentPage); }
  if (e.key === 'ArrowRight' && currentPage < pages.length) { currentPage++; render(currentPage); }
});
fetch('games.json').then(r => r.json()).then(data => { pages = data; render(1); });
</script>
</body>
</html>
