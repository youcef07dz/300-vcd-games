<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300 VCD Game Menu</title>
<link rel="stylesheet" href="style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #e0e0e0; min-height: 100vh; display: flex;
  justify-content: center; align-items: center; padding: 20px;
  background-size: contain; background-position: right; background-attachment: fixed; background-repeat: no-repeat;
}
.card {
  background: transparent; border-radius: 16px; padding: 24px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6); max-width: 420px; width: 100%;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  color: #000; font-weight: bold;
}
h1 { text-align: center; font-size: 24px; margin-bottom: 4px; }
.page { text-align: center; font-size: 13px; opacity: .6; margin-bottom: 20px; }
ul { list-style: none; }
li {
  padding: 10px 16px; border-bottom: 1px solid rgba(0,0,0,.1);
  font-size: 16px; display: flex; cursor: pointer; border-radius: 6px;
  text-decoration: none; color: inherit; transition: background .15s;
}
li:hover { background: rgba(0,0,0,.06); }
li:last-child { border-bottom: none; }
a { text-decoration: none; color: inherit; display: flex; width: 100%; }
.num { width: 32px; flex-shrink: 0; opacity: .5; }
.nav { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
.nav-btn {
  display: inline-block; padding: 8px 20px; background: rgba(0,0,0,.7);
  color: #fff; text-decoration: none; border-radius: 8px;
  font-size: 14px; transition: background .2s; cursor: pointer;
  border: none; font-weight: bold;
}
.nav-btn:hover { background: rgba(0,0,0,.9); }
.nav-btn:disabled { opacity: .3; cursor: default; }
</style>
</head>
<body>
<div class="card">
  <h1>Game Menu</h1>
  <div class="page" id="pageLabel">Page 1</div>
  <ul id="gameList"></ul>
  <div class="nav">
    <button class="nav-btn" id="prevBtn">← Previous</button>
    <button class="nav-btn" id="nextBtn">Next →</button>
  </div>
</div>
<script>
let pages;
let currentPage = 1;

function setBg(page) {
  const idx = ((page - 1) % 5) + 1;
  const colors = ['#fcba25','#f3f5ef','#e5edfa','#ffffff','#fdfbf8'];
  document.body.style.backgroundImage = `url(img/vcd-300-00${idx}.png)`;
  document.body.style.backgroundColor = colors[idx - 1];
}

function render(page) {
  const games = pages[page - 1];
  document.getElementById('pageLabel').textContent = `Page ${page}`;
  document.getElementById('gameList').innerHTML = games.map((g, i) =>
    `<a href="player.html?page=${page}&game=${i+1}"><li><span class="num">${i+1}.</span> ${g}</li></a>`
  ).join('');
  document.getElementById('prevBtn').disabled = page <= 1;
  document.getElementById('nextBtn').disabled = page >= pages.length;
  setBg(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentPage > 1) { currentPage--; render(currentPage); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentPage < pages.length) { currentPage++; render(currentPage); }


});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' && currentPage > 1) { currentPage--; render(currentPage); }
  if (e.key === 'ArrowRight' && currentPage < pages.length) { currentPage++; render(currentPage); }
});
fetch('games.json').then(r => r.json()).then(data => { pages = data; render(1); });
</script>
</body>
</html>
